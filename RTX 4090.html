<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>
        RTX 4090 | Artech
    </title>

    <link
    rel="stylesheet"
    href="RTX 4090.css">

    <link
    rel="preconnect"
    href="https://fonts.googleapis.com">

    <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

    <link
    rel="stylesheet"
    href="https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css">

   <link rel="icon"
    type="image/png"
    href="lambda.png">

</head>

<body>

    <!-- PARTICULAS -->

    <canvas id="bgCanvas"></canvas>

    <!-- HEADER -->

    <header class="header">

        <a
        href="index.html"
        class="logo">

            <img
            src="lambda 2.png"
            alt="Logo">

            <span>

                Artech

            </span>

        </a>

        <nav class="nav">

            <a href="Repuestos.html">

                Repuestos

            </a>

            <a
            href="Carrito.html"
            class="carrito">

                <i class="fi fi-rr-cart-shopping-fast"></i>

                <span
                class="cart-count"
                id="cartCount">

                    0

                </span>

            </a>

        </nav>

    </header>

    <!-- PRODUCTO -->

    <section class="product-page">

        <!-- GALERÍA -->

        <div class="product-gallery">

            <button class="gallery-btn prev">

                <i class="fi fi-rr-angle-left"></i>

            </button>

            <div class="gallery-container">

                <img
                class="gallery-slide active"
                src="https://images.unsplash.com/photo-1591488320449-011701bb6704?q=80&w=1200&auto=format&fit=crop"
                alt="RTX 4090">

                <img
                class="gallery-slide"
                src="https://images.unsplash.com/photo-1587202372634-32705e3bf49c?q=80&w=1200&auto=format&fit=crop"
                alt="RTX 4090">

                <img
                class="gallery-slide"
                src="https://images.unsplash.com/photo-1587202372616-b43abea06c2a?q=80&w=1200&auto=format&fit=crop"
                alt="RTX 4090">

            </div>

            <button class="gallery-btn next">

                <i class="fi fi-rr-angle-right"></i>

            </button>

        </div>

        <!-- INFO -->

        <div class="product-details">

            <p class="product-brand">

                ASUS ROG STRIX

            </p>

            <h1>

                RTX 4090 OC Edition

            </h1>

            <p class="product-description">

                Tarjeta gráfica premium diseñada
                para gaming extremo, edición profesional,
                inteligencia artificial y experiencias
                4K Ultra con Ray Tracing.

            </p>

            <!-- SPECS -->

            <div class="specs">

                <div class="spec">

                    <span>

                        VRAM

                    </span>

                    <strong>

                        24GB GDDR6X

                    </strong>

                </div>

                <div class="spec">

                    <span>

                        Boost Clock

                    </span>

                    <strong>

                        2610 MHz

                    </strong>

                </div>

                <div class="spec">

                    <span>

                        Tecnología

                    </span>

                    <strong>

                        DLSS 3

                    </strong>

                </div>

                <div class="spec">

                    <span>

                        Consumo

                    </span>

                    <strong>

                        450W

                    </strong>

                </div>

            </div>

            <!-- PRECIO -->

            <div class="product-price">

                Q18,999

            </div>

            <!-- BOTONES -->

            <div class="product-actions">

                <button id="addToCartBtn">

                    Agregar al carrito

                </button>

                <button
                class="buy-now"
                id="buyNowBtn">

                    Comprar ahora

                </button>

            </div>

        </div>

    </section>

    <script src="carrito-global.js"></script>

    <script src="Particulas.js"></script>

    <script src="Imagenes D.js"></script>

</body>

</html>
